<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusOne</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Passion+One:wght@400;700;900&display=swap"
        rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com" integrity="..." crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../assets/css/globalStyle.css">
    <link rel="stylesheet" href="../assets/css/designA.css">

</head>

<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-inner">
            <button class="back-btn" onclick="history.back()">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <div class="logo-tag">
                <p class="logo">Attendees</p>
            </div>

            <!-- This keeps the logo centered, because i put the invisible back button -->
            <div class="header-spacer"></div>
        </div>
    </header>

    <main>
        <div class="attendee-page-container">
            <p class="page-heading">Find attendees with similar interests as you</p>

            <div class="card-container" id="cardContainer"></div>

            <div class="bottom-buttons">
                <button id="noButton" class="no-button" onclick="handleSwipeAsButtonClick(-100)">
                    <i class="fa-solid fa-x"></i>
                </button>
                
                <button id="saveLaterButton" class="save-later-button" onclick="handleSaveLaterButton()">
                    <i class="fa-solid fa-bookmark"></i>
                </button>
                <button id="yesButton" class="yes-button" onclick="handleSwipeAsButtonClick(100)">
                    <i class="fa-solid fa-check"></i>
                </button>
            </div>
        </div>
    </main>

    <script src="https://kit.fontawesome.com/320539620b.js" crossorigin="anonymous"></script>
    <script type="module" src="../assets/js/designAScript.js" crossorigin="anonymous"></script>

</body>

</html>
