<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusOne - Profile</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Passion+One:wght@400;700;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/globalStyle.css">
    <link rel="stylesheet" href="../assets/css/userBio.css">
</head>

<body>
    <header class="app-header">
        <div class="header-inner">
            <!-- Optional back button, you can unhide it by removing the back-button-hidden class -->
            <div class="header-left-section">
                <button class="back-btn" onclick="history.back()">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <a href="../index.html" class="logo-tag">
                    <p class="page-title">Profile</p>
                </a>
            </div>

            <!-- This keeps the title centered, because now the page title is left alighned -->
            <div class="header-spacer"></div>
        
            <button class="header-button" id="addFriendBtn"> <i class="fas fa-user-plus"></i> <span id="addFriendBtnTxt">Add Friend</span></button>
        </div>
    </header>

    <main class="profile-page">
        <section class="profile-card">
            <div class="profile-hero">
                <img id="profileImage" class="profile-image" src="" alt="Profile picture">

                <div class="profile-top-info">
                    <div class="name-row">
                        <h1 id="profileName">Loading...</h1>
                        <span id="profileGender" class="gender-pill">...</span>
                    </div>

                </div>
            </div>

            <section class="profile-section">
                <h2>Likes</h2>
                <div id="likesList" class="tag-list"></div>
            </section>

            <section class="profile-section">
                <h2>Dislikes</h2>
                <div id="dislikesList" class="tag-list"></div>
            </section>

            <section class="profile-section">
                <h2>Hobbies</h2>
                <div id="hobbiesList" class="tag-list"></div>
            </section>
        </section>
    </main>
    <script src="https://kit.fontawesome.com/320539620b.js" crossorigin="anonymous"></script>
    <script type="module" src="../assets/js/userBio.js"></script>
</body>

</html>
