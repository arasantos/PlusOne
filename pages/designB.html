<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusOne</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Passion+One:wght@400;700;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/globalStyle.css">
    <link rel="stylesheet" href="../assets/css/designBStyle.css">

</head>

<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-inner">
            <!-- Optional back button, you can unhide it by removing the back-button-hidden class -->
            <button class="back-btn" onclick="history.back()">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <a href="../index.html" class="logo-tag">
                <p class="logo">Plus One</p>
            </a>

            <!-- This keeps the logo centered, because i put the invisible back button -->
            <button id="design-b-filter-button"> <i class="fa fa-sliders"></i> Filter</button>
        </div>
    </header>

    <main>
        <section id="design-b-container">
            <div id="design-b-header">
                <div></div>
                <div>Name</div>
                <div>Gender</div>
                <div>Preference</div>
            </div>
            <div id="design-b-filter-overlay" class="hidden"></div>
            
            <div id="design-b-filter-panel" class="hidden">

                <h3>Filter</h3>

                <div id="design-b-filter-gender" class="design-b-filter-section">
                    <h4>Gender</h4>
                    <label>
                        <input type="checkbox" class="design-b-filter-gender-check" value="Man"> Man
                    </label>
            
                    <label>
                        <input type="checkbox" class="design-b-filter-gender-check" value="Woman"> Woman
                    </label>
            
                    <label>
                        <input type="checkbox" class="design-b-filter-gender-check" value="Non-binary"> Non-Binary
                    </label>
                </div>

                <div id="design-b-filter-preference" class="design-b-filter-section">
                    <h4>Preference</h4>
                    <label>
                        <input type="checkbox" class="design-b-filter-preference-check" value="full"> Full
                    </label>
            
                    <label>
                        <input type="checkbox" class="design-b-filter-preference-check" value="partial"> Partial
                    </label>
            
                    <label>
                        <input type="checkbox" class="design-b-filter-preference-check" value="transit_only"> Transit Only
                    </label>
                </div>
            
                <br><br>

                <div id="design-b-filter-footer">
                    <button id="design-b-filter-cancel">Cancel</button>
                    <button id="design-b-filter-apply">Apply</button>
                </div>
            </div>
            <div id="design-b-attendee-container">
            </div>
        </section>
    </main>

    <script src="https://kit.fontawesome.com/320539620b.js" crossorigin="anonymous"></script>
    <script type="module" src="../assets/js/designBScript.js"></script>
    <script type="module" src="../assets/js/designBFilterScript.js"></script>
</body>

</html>
