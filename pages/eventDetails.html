<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusOne</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Passion+One:wght@400;700;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/globalStyle.css">
    <link rel="stylesheet" href="../assets/css/eventDetailsStyle.css">

</head>

<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-inner">
            <!-- Optional back button, you can unhide it by removing the back-button-hidden class -->
            <div class="header-left-section">
                <button class="back-btn" onclick="history.back()">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <a href="../index.html" class="logo-tag">
                    <p class="page-title">Event Details</p>
                </a>
            </div>

            <!-- This keeps the title centered, because now the page title is left alighned -->
            <div class="header-spacer"></div>
        
            <!-- Hidden until user clicks I'm Coming -->
            <a id="viewAttendeesBtn" class="header-button hidden" href="#">
                <i class="fa-solid fa-eye" aria-hidden="true"></i> View Attendees
            </a>
        </div>
    </header>

    <main>
        <section id="eventDetailContainer" class="event-detail">
            <div class="event-hero" id="eventHero"></div>

            <h1 id="eventTitle" class="event-title"></h1>

            <div class="event-line">
                <i class="fa-solid fa-user-group"></i>
                <span id="eventPeopleCount">17 people are coming</span>
            </div>

            <div class="event-line">
                <i class="fa-solid fa-location-dot"></i>
                <span id="eventLocation"></span>
            </div>

            <div class="event-line">
                <i class="fa-solid fa-calendar"></i>
                <span id="eventDate"></span>
            </div>

            <div class="event-line">
                <i class="fa-solid fa-clock"></i>
                <span id="eventTime">5pm</span>
            </div>

            <div class="event-desc">
                <div class="event-desc-label">Description:</div>
                <div id="eventDescription" class="event-desc-text"></div>
            </div>

            <div class="event-posted" id="eventPostedBy"></div>
        </section>
    </main>

    <button id="imComingBtn" class="bottom-cta">
        Join Event
    </button>

    <script type="module" src="../assets/js/eventDetailsScript.js"></script>
    <script src="https://kit.fontawesome.com/320539620b.js" crossorigin="anonymous"></script>

</body>

</html>
