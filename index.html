<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusOne</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Passion+One:wght@400;700;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./assets/css/globalStyle.css">
    <link rel="stylesheet" href="./assets/css/homepageStyle.css">

</head>

<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-inner">
            <!-- Optional back button, you can unhide it by removing the back-button-hidden class -->
            <div>
                <button class="back-btn back-button-hidden" onclick="history.back()">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
            </div>
            
            <a href="./index.html" class="logo-tag">
                <p class="logo">Plus One</p>
            </a>

            <!-- This keeps the logo centered, because i put the invisible back button -->
            <div class="header-spacer"></div>
        </div>
    </header>

    <main>
        <section class="events-section">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="eventSearch" placeholder="Search for Event">
            </div>
            <div id="eventsList" class="events-list"></div>
        </section>
    </main>

    <script type="module" src="./assets/js/homepageScript.js"></script>
    <script src="https://kit.fontawesome.com/320539620b.js" crossorigin="anonymous"></script>

</body>

</html>
